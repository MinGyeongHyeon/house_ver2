<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>이사 D-day</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#ffffff;
  font-family:'Pretendard',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
}
.wrap{width:100%;max-width:480px}

.label{
  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:#9CA3AF;margin-bottom:12px;font-family:'JetBrains Mono',monospace;
}
.title{font-size:20px;font-weight:700;color:#0F1117;margin-bottom:4px;letter-spacing:-.02em}
.subtitle{font-size:13px;color:#9CA3AF;margin-bottom:24px}

/* Countdown boxes */
.count-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.count-box{
  background:#F8F9FA;border:1px solid #EAECF0;border-radius:12px;
  padding:16px 8px;text-align:center;
}
.count-num{
  font-family:'JetBrains Mono',monospace;
  font-size:32px;font-weight:700;line-height:1;
  color:#1A56DB;
  transition:all .3s;
}
.count-num.urgent{color:#DC2626}
.count-num.soon{color:#D97706}
.count-unit{font-size:11px;color:#9CA3AF;margin-top:6px;font-weight:500}

/* Progress */
.progress-track{
  height:6px;background:#EAECF0;border-radius:99px;overflow:hidden;margin-bottom:8px;
}
.progress-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#1A56DB,#60A5FA);
  transition:width 1.4s cubic-bezier(.4,0,.2,1);width:0%;
}
.progress-meta{
  display:flex;justify-content:space-between;
  font-size:11px;color:#9CA3AF;font-family:'JetBrains Mono',monospace;
}

/* Badge */
.badge{
  display:inline-flex;align-items:center;
  font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:4px 12px;border-radius:99px;margin-bottom:16px;
}
.badge.ok{background:#EFF6FF;color:#1A56DB}
.badge.soon{background:#FFFBEB;color:#D97706}
.badge.urgent{background:#FEF2F2;color:#DC2626}
.badge.done{background:#ECFDF5;color:#059669}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">🏠 새 보금자리 프로젝트</div>
  <div class="title">잔금일 &amp; 이사일까지</div>
  <div class="subtitle">2026년 6월 22일</div>

  <div class="badge ok" id="badge">계산 중...</div>

  <div class="count-grid">
    <div class="count-box"><div class="count-num" id="dd-days">—</div><div class="count-unit">일</div></div>
    <div class="count-box"><div class="count-num" id="dd-hours">—</div><div class="count-unit">시간</div></div>
    <div class="count-box"><div class="count-num" id="dd-mins">—</div><div class="count-unit">분</div></div>
    <div class="count-box"><div class="count-num" id="dd-secs">—</div><div class="count-unit">초</div></div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="bar"></div></div>
  <div class="progress-meta">
    <span id="meta-left">계약일 2026.04.04</span>
    <span id="meta-pct">0% 경과</span>
  </div>
</div>

<script>
const TARGET   = new Date('2026-06-22T00:00:00');
const START    = new Date('2026-04-04T00:00:00');
const numEls   = ['dd-days','dd-hours','dd-mins','dd-secs'];

function tick() {
  const now  = new Date();
  const diff = TARGET - now;
  const pct  = Math.min(100, Math.max(0, (now - START) / (TARGET - START) * 100));
  const badge = document.getElementById('badge');
  const nums  = numEls.map(id => document.getElementById(id));

  document.getElementById('bar').style.width = pct.toFixed(1) + '%';
  document.getElementById('meta-pct').textContent = pct.toFixed(0) + '% 경과';

  if (diff <= 0) {
    nums.forEach(el => { el.textContent = '0'; el.className = 'count-num done'; });
    badge.textContent = '🎉 이사 완료!';
    badge.className = 'badge done';
    return;
  }

  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor(diff % 86400000 / 3600000);
  const mins  = Math.floor(diff % 3600000  / 60000);
  const secs  = Math.floor(diff % 60000    / 1000);

  const colorClass = days <= 7 ? 'urgent' : days <= 30 ? 'soon' : '';
  const values = [days, hours, mins, secs];
  nums.forEach((el, i) => {
    el.textContent  = i === 0 ? days : String(values[i]).padStart(2, '0');
    el.className    = 'count-num ' + colorClass;
  });

  if (days <= 7) {
    badge.textContent = `D-${days} 🔥 거의 다 왔어요!`;
    badge.className = 'badge urgent';
  } else if (days <= 30) {
    badge.textContent = `D-${days} ⚡ 막바지 준비!`;
    badge.className = 'badge soon';
  } else {
    badge.textContent = `D-${days}`;
    badge.className = 'badge ok';
  }
}

// 진행바 초기 애니메이션
window.addEventListener('load', () => {
  tick();
  setTimeout(() => {
    const pct = Math.min(100, Math.max(0, (new Date() - START) / (TARGET - START) * 100));
    document.getElementById('bar').style.width = pct.toFixed(1) + '%';
  }, 300);
  setInterval(tick, 1000);
});
</script>
</body>
</html>
